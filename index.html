<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CPIS360 WebAR Marker App</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">

  <a-scene embedded arjs>
    <a-marker preset="hiro">

      <a-box
        position="-1 0.5 0"
        rotation="0 45 0"
        color="red"
        scale="0.7 0.7 0.7"
        animation="property: rotation; to: 0 405 0; loop: true; dur: 3000">
      </a-box>

      <a-sphere
        position="0 0.7 0"
        color="blue"
        radius="0.45"
        scale="1 1 1"
        animation="property: position; to: 0 1 0; dir: alternate; loop: true; dur: 1500">
      </a-sphere>

      <a-cylinder
        position="1 0.5 0"
        radius="0.3"
        height="1"
        color="green"
        scale="1 1 1"
        animation="property: scale; to: 1.2 1.5 1.2; dir: alternate; loop: true; dur: 2000">
      </a-cylinder>

      <a-text
        value="Abdulrahman"
        position="-1.2 1.8 0"
        rotation="-90 0 0"
        color="yellow"
        align="center"
        width="4">
      </a-text>

    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

</body>
</html>
